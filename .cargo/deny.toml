[graph]
targets = ["x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl"]
all-features = true

[advisories]
ignore = [
    "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = [
    { crate = "axum@0.7.9", reason = "transitive from opentelemetry-otlp, direct dep uses 0.8.9" },
    { crate = "axum-core@0.4.5", reason = "transitive from opentelemetry-otlp" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
confidence-threshold = 0.95
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]
exceptions = []