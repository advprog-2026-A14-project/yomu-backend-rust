name: CI

on:
  push:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check


  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --all --all-targets -- -W warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --all --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: yomu
          POSTGRES_PASSWORD: yomu_password
          POSTGRES_DB: yomu_engine_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features native-tls,postgres

      - name: Run Database Migrations
        run: cargo sqlx migrate run
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run library unit tests
        run: cargo nextest run --lib --profile ci
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run binary unit tests
        run: cargo nextest run --bin yomu-backend-rust --profile ci
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run infrastructure tests
        run: cargo nextest run --test infrastructure_test --profile ci
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run presentation tests
        run: cargo nextest run --test presentation_test --profile ci
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run use case tests
        run: cargo nextest run --test usecase_test --profile ci
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run user_sync use case tests
        run: cargo nextest run --test user_sync_usecase_test --profile ci
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run user_sync infrastructure tests
        run: cargo nextest run --test user_sync_infrastructure_test --profile ci
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run user_sync presentation tests
        run: cargo nextest run --test user_sync_presentation_test --profile ci
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run doc tests
        run: cargo test --doc --all-features

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-results-${{ matrix.os }}
          path: |
            target/nextest/*.xml
            target/nextest/*.log
          retention-days: 7

      - name: Check sqlx prepare (Offline Mode)
        run: cargo sqlx prepare --workspace --check
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, doc, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: yomu-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_DESCRIPTION=Yomu Backend Rust - Gamification Engine
            IMAGE_LICENSES=MIT