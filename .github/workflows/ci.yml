name: CI

on:
  push:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check


  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --all --all-targets -- -W warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --all --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: yomu
          POSTGRES_PASSWORD: yomu_password
          POSTGRES_DB: yomu_engine_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U yomu -q; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Wait for Redis
        run: |
          for i in {1..15}; do
            if redis-cli -h localhost -p 6379 ping | grep -q PONG; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Waiting for Redis... ($i/15)"
            sleep 2
          done
          echo "Redis failed to start"
          exit 1

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features native-tls,postgres

      - name: Run Database Migrations
        run: cargo sqlx migrate run
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test

      - name: Run library unit tests
        run: cargo test --lib
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run binary unit tests
        run: cargo test --bin yomu-backend-rust
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run infrastructure tests
        run: cargo test --test infrastructure_test
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run presentation tests
        run: cargo test --test presentation_test
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Run use case tests
        run: cargo test --test usecase_test
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test
          REDIS_URL: redis://localhost:6379

      - name: Check sqlx prepare (Offline Mode)
        run: cargo sqlx prepare --workspace --check
        env:
          DATABASE_URL: postgresql://yomu:yomu_password@localhost:5432/yomu_engine_test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, doc, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: yomu-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max