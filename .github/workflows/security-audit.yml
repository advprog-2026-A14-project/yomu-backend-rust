name: Security Audit

on:
  push:
    branches:
      - main
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/security-audit.yml'
      - '.cargo/audit.toml'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/security-audit.yml'
      - '.cargo/audit.toml'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
        env:
          RUST_LOG: cargo_audit=debug

      - name: Run cargo audit with deny-warnings
        run: cargo audit --deny-warnings
        continue-on-error: true

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        run: |
          curl -LsSf https://raw.githubusercontent.com/EmbarkStudios/cargo-deny/main/install.sh | sh -s -- --prefix ~/.cargo

      - name: Run cargo deny check
        run: ~/.cargo/bin/cargo-deny check advisories licenses bans