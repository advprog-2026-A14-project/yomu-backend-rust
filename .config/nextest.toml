# .config/nextest.toml
nextest-version = "0.9"

[store]
dir = "target/nextest"

[profile.default]
fail-fast = true
retries = 0
success-output = "immediate"
failure-output = "immediate"
slow-timeout = { period = "60s", terminate-after = 2, grace-period = "10s" }

[profile.ci]
fail-fast = false
retries = 2
slow-timeout = { period = "120s", terminate-after = 3 }
test-threads = "num-cpus"

[profile.ci.junit]
filename = "nextest-results.xml"